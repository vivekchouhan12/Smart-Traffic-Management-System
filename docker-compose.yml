version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  timescale:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: traffic_analytics
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - timescale
    environment:
      - REDIS_URL=redis://redis:6379

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  simulation:
    build:
      context: ./simulation
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379

volumes:
  timescale-data:
